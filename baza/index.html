<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baza Ćwiczeń — Architektura Mocy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 2rem;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    header img {
      height: 40px;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .filters {
      padding: 1.5rem 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      border-bottom: 1px solid #1a1a1a;
    }

    .filter-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #555; color: #fff; }
    .filter-btn.active { background: #fff; color: #111; border-color: #fff; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1px;
      background: #1a1a1a;
    }

    .card {
      background: #111;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: background 0.15s;
    }

    .card:hover { background: #161616; }

    .card-media {
      width: 100%;
      aspect-ratio: 4/3;
      background: #0a0a0a;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-media .no-media {
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    .card-name {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .card-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
      background: #1a1a1a;
      color: #666;
    }

    .tag.partia { color: #888; }

    .card-params {
      font-size: 0.75rem;
      color: #555;
      display: flex;
      gap: 1rem;
    }

    .card-params span { color: #777; }

    .hidden { display: none; }

    .count {
      padding: 1rem 2rem;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

<header>
  <img src="../logo.svg" alt="MN">
  <h1>Baza Ćwiczeń</h1>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-partia="all">Wszystkie</button>
  <button class="filter-btn" data-partia="push">Push</button>
  <button class="filter-btn" data-partia="pull">Pull</button>
  <button class="filter-btn" data-partia="dół">Dół</button>
  <button class="filter-btn" data-partia="core">Core</button>
</div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>

<script>
  let all = [];
  let active = 'all';

  fetch('cwiczenia.json')
    .then(r => r.json())
    .then(data => {
      all = data.cwiczenia;
      render();
    });

  function render() {
    const filtered = active === 'all' ? all : all.filter(c => c.partia === active);
    document.getElementById('count').textContent = `${filtered.length} ćwiczeń`;
    document.getElementById('grid').innerHTML = filtered.map(card).join('');
  }

  function card(c) {
    const media = c.link && c.link !== '-'
      ? `<img src="${c.link}" alt="${c.nazwa_pl}" loading="lazy">`
      : `<span class="no-media">brak animacji</span>`;

    const tempo = c.tempo && c.tempo !== '-' ? `<span>tempo <span>${c.tempo}</span></span>` : '';
    const powt = c.powtorzenia ? `<span>powt. <span>${c.powtorzenia}</span></span>` : '';

    return `
      <div class="card">
        <div class="card-media">${media}</div>
        <div class="card-name">${c.nazwa_pl}</div>
        <div class="card-meta">
          <span class="tag partia">${c.partia}</span>
          ${(c.miesnie || []).map(m => `<span class="tag">${m}</span>`).join('')}
        </div>
        <div class="card-params">${tempo}${powt}</div>
      </div>`;
  }

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    active = btn.dataset.partia;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
</script>
</body>
</html>
